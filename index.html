<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ringraziamenti</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 24px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Grazie per aver fatto parte del mio percorso</h1>
    <p>Inserisci qui la tua password</p>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Accedi</button>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById("password").value.trim();

      if (password === "mamma123") {
        window.location.href = "mamma.html";
      } else if (password === "amico456") {
        window.location.href = "amico.html";
      } else {
        alert("Password errata");
      }
    }
  </script>
</body>
</html>
