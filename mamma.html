<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Per te</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #444;
    }

    img {
      max-width: 250px;
      width: 100%;
      border-radius: 14px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Grazie ❤️</h1>
    <img src="mamma.jpg">
    <p>
      Grazie per essermi stata accanto in ogni momento, per il supporto,
      la pazienza e l’affetto che mi hai dato durante tutto questo percorso.
      Questo traguardo è anche tuo.
    </p>
  </div>
</body>
</html>
